name: sensitive_content_analysis
description: "Flutter package for detecting and alerting users to nudity in images and videos before displaying them, utilizing the SensitiveContentAnalysis Framework by Apple."
version: 2.1.1
homepage: https://github.com/doppeltilde/sensitive_content_analysis

topics:
  - nsfw
  - nsfw-detection
  - content-moderation
  - moderation
  - sensitive-content
  - sensitive-content-analysis
  - video
  - image
  - photo

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SensitiveContentAnalysisPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: SensitiveContentAnalysisPlugin
        sharedDarwinSource: true